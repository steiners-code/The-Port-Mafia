services:
  api-gateway:
    build: ./backend/api-gateway
    container_name: mafia-api-gateway
    restart: always
    ports:
      - "3810:3000"
    env_file:
      - ./backend/api-gateway/.env
    volumes:
      - ./backend/api-gateway:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - mafia-network
      - global-database-network
    depends_on:
      - main-service
      - linkedin-service

  main-service:
    build: ./backend/main
    container_name: mafia-main
    restart: always
    env_file:
      - ./backend/main/.env
    volumes:
      - ./backend/main:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - mafia-network
      - global-database-network

  linkedin-service:
    build: ./backend/linkedin
    container_name: mafia-linkedin
    restart: always
    env_file:
      - ./backend/linkedin/.env
    volumes:
      - ./backend/linkedin:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - mafia-network
      - global-database-network
  #   depends_on:
  #     - frontend

  # frontend:
  #   build: ./frontend
  #   container_name: mafia-frontend
  #   restart: always
  #   volumes:
  #     - ./frontend:/usr/src/app
  #     - /usr/src/app/node_modules
  #   ports:
  #     - "81:3000"
  #   networks:
  #     - mafia-network
  #   env_file:
  #     - ./frontend/.env

networks:
  mafia-network:
    driver: bridge

  global-database-network:
    external: true

