services:
  api-gateway:
    build: ./backend/api-gateway
    container_name: mafia-api-gateway
    restart: always
    ports:
      - "3810:3000"
    env_file:
      - ./backend/api-gateway/.env
    networks:
      - mafia-network
      - global-database-network
    depends_on:
      - main-service
      - linkedin-service

  main-service:
    build: ./backend/main
    container_name: mafia-main
    restart: always
    env_file:
      - ./backend/main/.env
    networks:
      - mafia-network
      - global-database-network
    depends_on:
      - frontend

  linkedin-service:
    build: ./backend/linkedin
    container_name: mafia-linkedin
    restart: always
    env_file:
      - ./backend/linkedin/.env
    networks:
      - mafia-network
      - global-database-network

  frontend:
    build: ./frontend
    container_name: mafia-frontend
    restart: always
    ports:
      - "81:3000"
    networks:
      - mafia-network
    env_file:
      - ./frontend/.env

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: cron-ofelia
    restart: always
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mafia-network
    depends_on:
      - main-service
      - linkedin-service

  linkedin-token-refresh:
    image: curlimages/curl:latest
    container_name: cron-linkedin-token-refresh
    networks:
      - home-network
    entrypoint: [ "true" ]
    labels:
      ofelia.enabled: "true"
      ofelia.job-run.linkedin-token-refresh.schedule: "0 0 0 * * *"
      ofelia.job-run.linkedin-token-refresh.image: "curlimages/curl:latest"
      ofelia.job-run.linkedin-token-refresh.network: "home-network"
      ofelia.job-run.linkedin-token-refresh.command: >-
        curl -f -X GET http://mafia-linkedin:3000/cron/token-refresh -H "x-cron-secret: ${CRON_API_SECRET}"

  db-cleanup:
    image: curlimages/curl:latest
    container_name: cron-db-cleanup
    networks:
      - home-network
    entrypoint: [ "true" ]
    labels:
      ofelia.enabled: "true"
      ofelia.job-run.db-cleanup.schedule: "0 0 0 * * *"
      ofelia.job-run.db-cleanup.image: "curlimages/curl:latest"
      ofelia.job-run.db-cleanup.network: "home-network"
      ofelia.job-run.db-cleanup.command: >-
        curl -f -X GET http://user-service:3000/cron/db-cleanup -H "x-cron-secret: ${CRON_API_SECRET}"

networks:
  mafia-network:
    driver: bridge

  global-database-network:
    external: true
